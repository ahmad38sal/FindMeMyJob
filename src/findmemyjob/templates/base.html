<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}FindMeMyJob{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header>
    <nav>
        {% set path = request.url.path if request else '/' %}
        <a href="/" class="brand">FindMeMyJob</a>
        <a href="/profile" {% if path.startswith('/profile') and not path.startswith('/profile/experience') %}class="active"{% endif %}>Profile</a>
        <a href="/profile/experience" {% if path.startswith('/profile/experience') %}class="active"{% endif %}>Experience</a>
        <a href="/jobs/top-picks" {% if path.startswith('/jobs/top-picks') %}class="active"{% endif %}>Top Picks</a>
        <a href="/jobs" {% if path.startswith('/jobs') and not path.startswith('/jobs/top-picks') %}class="active"{% endif %}>Jobs</a>
        <a href="/applications" {% if path.startswith('/applications') %}class="active"{% endif %}>Dashboard</a>
        <a href="/skills" {% if path.startswith('/skills') %}class="active"{% endif %}>Skill Growth</a>
    </nav>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
